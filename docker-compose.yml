services:
  db:
    image: postgres:16
    container_name: music_store_postgres
    environment:
      POSTGRES_DB: music_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
